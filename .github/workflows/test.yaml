name: Test Apps
on:
  push:
    branches:
      - main
permissions: read-all
jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.list.outputs.formulas }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: list
        run: |
          formulas=$(find Formula -maxdepth 1 -name '*.rb' -exec basename {} .rb \; | jq -R . | jq -s -c .)
          echo "formulas=$formulas" >> "$GITHUB_OUTPUT"
  test:
    needs: scan
    if: needs.scan.outputs.formulas != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.scan.outputs.formulas) }}
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Add Homebrew to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
      - name: Install ${{ matrix.app }}
        run: brew install sv-tools/apps/${{ matrix.app }}
      - name: Test ${{ matrix.app }}
        run: brew test sv-tools/apps/${{ matrix.app }}
